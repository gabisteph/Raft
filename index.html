<!DOCTYPE html>
<html>

<head>
  <title>Raft</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Press Start 2P', cursive;
    }

    /* HUD principal */
    #gameHUD {
      position: absolute;
      top: 20px;
      right: 30px;
      z-index: 10;

      color: #ffffff;
      text-shadow:
        3px 3px 0 #000,
        6px 6px 0 rgba(0, 0, 0, 0.4);

      font-family: 'Press Start 2P', cursive;
      text-align: left;
      /* caixa transparente */
      background: rgba(0, 0, 0, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.25);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }

    /* título */
    #gameHUD h2 {
      font-size: 22px;
      margin: 0 0 15px 0;
      letter-spacing: 2px;
    }

    /* informações */
    /* informações */
    #gameHUD p {
      font-size: 10px;
      margin: 8px 0;
      line-height: 1.8;

      display: flex;
      align-items: center;
      gap: 12px;

      min-width: 320px;
    }

    /* deixa todos os spans alinhados */
    #gameHUD p span {
      min-width: 80px;
      display: inline-block;
      text-align: left;
    }

    /* timer sem tamanho diferente pra não desalinha */
    #timer {
      font-size: 10px;
      display: inline-block;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "./node_modules/three/build/three.module.js",
      "three/addons/": "./node_modules/three/examples/jsm/"
    }
  }
  </script>

</head>

<body>

  <div id="gameHUD">
    <h2>LEVEL 1</h2>

    <p>📦 CONTAINERS ENTREGUES: <span id="containers">10</span></p>

    <p>⚖️ ESTABILIDADE DO BARCO: <span id="stability">100%</span></p>

    <p>⏰ TEMPO: <span id="timer">00:00</span></p>
  </div>

  <script>
    let seconds = 0;
    const timerElement = document.getElementById("timer");

    function updateTimer() {
      seconds++;

      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;

      const formattedTime =
        String(minutes).padStart(2, '0') +
        ":" +
        String(secs).padStart(2, '0');

      timerElement.textContent = formattedTime;
    }

    setInterval(updateTimer, 1000);
  </script>

  <script type="module" src="main.js"></script>

</body>

</html>
